# --- General options --- #

url: "http://ausevo.github.io"
baseurl: ""

title: Australasian Evolution Society
description: Promoting the scientific study of evolution

# --- Navigation bar --- #
# Structure: top-level keys map to either a URL string (simple link) or
# an array of {Label: url} hashes (dropdown). Update each year as needed.

navbar-links:
  Conference:
    - Overview: "conference"
    - Programme: "programme"
    - Registration: "registration"
    - Venue: "2026_Venue"
    - Sponsors: "sponsors"
    - Past Conferences: "past-conf"
  Grants & Awards:
    # - ECR Grants: "2025_ECR_grants"
    # - Research Excellence: "2025_research_awards"
    - Past ECR Awards: "previous_winners"
    - Past Talk Awards: "talk_awards"
  Society:
    - About AES: "about"
    - Executive: "contact"
    - Constitution: "constitution"
    - AGM Minutes: "requestMins"
    # - Code of Conduct: "code_of_conduct"
  Join!: "join"

# --- Author / social --- #

author:
  name: Australasian Evolution Society
  email: "austevolutionsociety@gmail.com"
  facebook: ausevosoc
  twitter: austevolsoc
  github: austevolsoc.bsky.social   # repurposed for Bluesky — see _includes/footer.html

# --- Conference season (drives homepage) --- #
# The homepage hero switches to conference mode when today falls within
# [conference_season_start, conference_season_end].
# Set conference_season_override: true to force-on regardless of dates.
# Set conference_season_override: false to force-off regardless of dates.
# Leave conference_season_override absent (or comment it out) to use dates only.

conference_season_start: "2026-05-15"   # Update each year when registration opens
conference_season_end:   "2026-12-04"   # Update each year to ~1 month after conf ends
# conference_season_override: false    # Uncomment and set true/false to override

# --- Analytics --- #

# Google Analytics 4 — add your G-XXXXXXXXXX Measurement ID here
# google_analytics_4: "G-XXXXXXXXXX"

# Legacy UA (no longer functional — kept for reference only)
# google_analytics: "UA-75904828-1"

# Disqus comments shortname (used by post layout when page.comments: true)
disqus: "ausevo"

# --- Misc --- #

url-pretty: "ausevo.com"

# --- Jekyll build options --- #

timezone: "Australia/Sydney"
markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title/
paginate: 7

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true
  - scope:
      path: ""
    values:
      layout: "page"

exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - CNAME
  - Vagrantfile
  - MAINTENANCE.md

# prose.io config
prose:
  rooturl: '_posts'
  media: 'img'
  ignore:
    - 404.html
    - LICENSE
    - feed.xml
    - _config.yml
    - /_layouts
    - /_includes
    - /css
    - /img
    - /js
  metadata:
    _posts:
      - name: "layout"
        field:
          element: "hidden"
          value: "post"
      - name: "title"
        field:
          element: "text"
          label: "Post title"
          placeholder: "Title"
          alterable: true
      - name: "subtitle"
        field:
          element: "textarea"
          label: "Subtitle"
          placeholder: "A description of your post."
          alterable: true
      - name: "date"
        field:
          element: "text"
          label: "Date"
          help: "Enter date of post."
          placeholder: "yyyy-mm-dd"
          alterable: true
      - name: "published"
        field:
          element: "checkbox"
          label: "Publish"
          help: "Check to publish post, uncheck to hide."
