<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.subtitle %}{{ page.subtitle }}{% elsif page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />
  <meta name="author" content="{{ site.author.name }}" />

  <link rel="canonical" href="{{ site.url }}{{ page.url | remove: 'index.html' }}" />
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ site.baseurl }}/feed.xml" />

  <!-- Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Icons: Font Awesome 6 Free -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.7.2/css/all.min.css"
        crossorigin="anonymous" />

  <!-- AES Theme -->
  <link rel="stylesheet" href="{{ '/css/aes-theme.css' | relative_url }}" />

  <!-- OpenGraph -->
  <meta property="og:title"       content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}" />
  <meta property="og:description" content="{% if page.subtitle %}{{ page.subtitle }}{% else %}{{ site.description }}{% endif %}" />
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="{{ site.url }}{{ page.url }}" />
  <meta property="og:image"       content="{{ site.url }}/img/AES_logo1.png" />
  <meta property="og:site_name"   content="{{ site.title }}" />

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:site"        content="@{{ site.author.twitter }}" />
  <meta name="twitter:title"       content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}" />
  <meta name="twitter:description" content="{% if page.subtitle %}{{ page.subtitle }}{% else %}{{ site.description }}{% endif %}" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="{{ '/img/AES_logo1.png' | relative_url }}" />
</head>
