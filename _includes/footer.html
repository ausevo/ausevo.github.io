<footer class="site-footer" role="contentinfo">
  <div class="container">
    <div class="footer__grid">

      <div>
        <a href="{{ '/' | relative_url }}" class="footer__brand" aria-label="{{ site.title }}">
          <span class="footer__brand-name">{{ site.author.name }}</span>
        </a>
        <p class="footer__tagline">{{ site.description }}</p>
        <p class="footer__abn">ABN: 46 823 972 343</p>
      </div>

      <div class="footer__social">
        <a href="https://bsky.app/profile/austevolsoc.bsky.social"
           class="footer__social-link" aria-label="Follow AES on Bluesky"
           target="_blank" rel="noopener noreferrer">
          <i class="fa-brands fa-bluesky" aria-hidden="true"></i>
        </a>
        <a href="https://twitter.com/{{ site.author.twitter }}"
           class="footer__social-link" aria-label="Follow AES on X (Twitter)"
           target="_blank" rel="noopener noreferrer">
          <i class="fa-brands fa-x-twitter" aria-hidden="true"></i>
        </a>
        <a href="https://facebook.com/{{ site.author.facebook }}"
           class="footer__social-link" aria-label="Follow AES on Facebook"
           target="_blank" rel="noopener noreferrer">
          <i class="fa-brands fa-facebook-f" aria-hidden="true"></i>
        </a>
        <a href="mailto:{{ site.author.email }}"
           class="footer__social-link" aria-label="Email AES">
          <i class="fa-solid fa-envelope" aria-hidden="true"></i>
        </a>
      </div>

    </div>

    <hr class="footer__divider" />

    <div class="footer__bottom">
      <p>&copy; {{ 'now' | date: '%Y' }} {{ site.author.name }}</p>
      <p>
        Built with <a href="https://jekyllrb.com" target="_blank" rel="noopener noreferrer">Jekyll</a>
        &middot;
        Hosted on <a href="https://pages.github.com" target="_blank" rel="noopener noreferrer">GitHub Pages</a>
      </p>
    </div>
  </div>
</footer>
